<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valentine Day</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(rgba(255,0,0,0.6), rgba(255,0,0,0.6)),
    url("https://images.unsplash.com/photo-1518895949257-7621c3c786d7");
    background-size: cover;
    background-position: center;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    font-size: 80px;
    color: red;
    text-shadow: 3px 3px 8px black;
}

h2 {
    font-size: 36px;
    margin-bottom: 40px;
}

button {
    padding: 15px 35px;
    font-size: 20px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    position: relative;
}

.yes {
    background: #ff2e63;
    color: white;
}

.no {
    background: #333;
    color: white;
    position: absolute;
}
</style>
</head>

<body>

<div>
    <h1>VALENTINE DAY</h1>
    <h2>WILL YOU BE MY VALENTINE?</h2>

    <button class="yes" onclick="goYes()">YES PLEASE 💖</button>
    <button class="no" id="noBtn">NO THANKS 😏</button>
</div>

<script>
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 150);
    const y = Math.random() * (window.innerHeight - 80);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

function goYes() {
    window.location.href = "yes.html";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>You Said Yes 💖</title>

<style>
body {
    margin: 0;
    background: #ff4d6d;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    padding: 30px;
}

h1 {
    font-size: 50px;
}

.container {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
}

.box {
    background: rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 20px;
    width: 300px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

iframe {
    width: 100%;
    height: 180px;
    border-radius: 15px;
    border: none;
}

#letter {
    font-size: 18px;
    line-height: 1.6;
}
</style>
</head>

<body>

<!-- BACKGROUND MUSIC -->
<audio autoplay loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<h1>💘 Happy Valentine’s Day 💘</h1>

<div class="container">

    <!-- LETTER -->
    <div class="box">
        <h2>💌 Love Letter</h2>
        <p id="letter"></p>
    </div>

    <!-- SONG -->
    <div class="box">
        <h2>🎶 Valentine Song</h2>
        <iframe src="https://www.youtube.com/embed/rtOvBOTyX00" allowfullscreen></iframe>

    </div>

    <!-- WISHES -->
    <div class="box">
        <h2>🌹 Wishes</h2>
        <p>
            May our love grow stronger every day,
            more smiles, more laughter, and endless memories.
            I choose you ❤️
        </p>
    </div>

</div>

<script>
const text = "From the moment I met you, my world changed. You make my days brighter and my heart happier. Thank you for choosing me. Happy Valentine’s Day ❤️";
let i = 0;

function typeEffect() {
    if (i < text.length) {
        document.getElementById("letter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 50);
    }
}

typeEffect();
</script>

</body>
</html>
